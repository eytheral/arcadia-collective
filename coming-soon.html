<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcadia Collective — Coming Soon</title>
<meta name="description" content="Arcadia Collective — Premium TCG accessories. Coming soon.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wdth,wght@125,400;125,600;125,700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --accent: #d5ee0e;
  --text: #f5f5f5;
  --text-muted: rgba(245, 245, 245, 0.5);
}

html, body {
  height: 100%;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

.page {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  height: 100svh;
  position: relative;
  text-align: center;
  padding: 40px 24px;
}

/* Subtle radial glow behind logo */
.page::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -60%);
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(213, 238, 14, 0.06) 0%, transparent 70%);
  pointer-events: none;
}

.logo-wrapper {
  opacity: 0;
  transform: scale(0.6);
  animation: logoIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards, pulse 2.5s ease-in-out 1.5s infinite;
}

.logo-wrapper svg {
  filter: drop-shadow(0 0 60px rgba(213, 238, 14, 0.15));
}

.brand-name {
  font-family: 'Nunito Sans', sans-serif;
  font-size: clamp(20px, 4vw, 32px);
  font-weight: 700;
  font-stretch: expanded;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text);
  margin-top: 40px;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
}

.tagline {
  font-family: 'Inter', sans-serif;
  font-size: clamp(11px, 2vw, 14px);
  font-weight: 300;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 16px;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.3s forwards;
}

.divider {
  width: 60px;
  height: 1px;
  background: var(--accent);
  margin: 32px auto;
  opacity: 0;
  animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.5s forwards;
}

.coming-text {
  font-family: 'Inter', sans-serif;
  font-size: clamp(13px, 2.5vw, 16px);
  font-weight: 400;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.7s forwards;
}

.contact {
  position: absolute;
  bottom: 40px;
  left: 0;
  right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
  opacity: 0;
  animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 2s forwards;
}

.contact a {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  text-decoration: none;
  transition: color 0.3s ease;
}

.contact a:hover {
  color: var(--accent);
}

@keyframes logoIn {
  to { opacity: 1; transform: scale(1); }
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  15% { transform: scale(1.08); }
  30% { transform: scale(1); }
  45% { transform: scale(1.05); }
  60% { transform: scale(1); }
}

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="page">
  <div class="logo-wrapper">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="591 469 318 318" width="140" height="140">
      <path fill="#d5ee0e" d="M 724.2 469.2 L 775.8 469.2 L 766 589.5 L 844.2 497.5 L 880.6 534 L 788.7 612.1 L 908.9 602.4 L 908.9 653.9 L 788.7 644.2 L 880.6 722.3 L 844.2 758.8 L 766 666.8 L 775.8 787.1 L 724.2 787.1 L 734 666.8 L 655.8 758.8 L 619.4 722.3 L 711.3 644.2 L 591.1 653.9 L 591.1 602.4 L 711.3 612.1 L 619.4 534 L 655.8 497.5 L 734 589.5 Z"/>
    </svg>
  </div>

  <h1 class="brand-name">Arcadia Collective</h1>
  <p class="tagline">Premium TCG Accessories</p>

  <div class="divider"></div>

  <p class="coming-text">Coming Soon</p>

  <div class="contact">
    <a href="https://instagram.com/discoverarcadia" target="_blank" rel="noopener">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 6px;"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>@discoverarcadia
    </a>
    <span style="margin: 0 16px; color: rgba(245,245,245,0.2);">|</span>
    <a href="mailto:admin@arcadia-collective.net">admin@arcadia-collective.net</a>
  </div>
</div>
</body>
</html>
